<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Mathforces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f7f9;
            font-family: 'Inter', sans-serif;
        }
        .navbar { background-color: #0f172a !important; }
        .edit-card { 
            border-radius: 12px; 
            background: white;
            border: 1px solid #e2e8f0;
            padding: 30px;
        }
        .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 0.25rem rgba(14, 165, 233, 0.25);
        }
        .preview-pane { background-color: #f8fafc; border-radius: 8px; padding: 20px; border: 1px solid #e2e8f0; margin-top: 20px; display: none; }
        .preview-pane.active { display: block; }
        .preview-content { font-size: 1rem; line-height: 1.8; color: #334155; }
        .preview-content h1, .preview-content h2, .preview-content h3 { margin-top: 16px; margin-bottom: 8px; font-weight: 700; }
        .preview-content code { background-color: #e2e8f0; padding: 2px 6px; border-radius: 4px; color: #dc2626; }
        .preview-content pre { background-color: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 8px 16px; border: 2px solid #e2e8f0; background: white; border-radius: 6px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .tab-btn.active { border-color: #0ea5e9; color: #0ea5e9; background-color: #f0f9ff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'problem_list' %}">MATHFORCES</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="edit-card shadow-sm">
                <h2 class="fw-bold mb-4 text-dark">Edit Your Post</h2>
                
                <form method="POST" id="editForm">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Post Title</label>
                        <input type="text" name="title" class="form-control" 
                               placeholder="Enter title..." value="{{ post.title }}" required>
                    </div>

                    <div class="tab-buttons">
                        <button type="button" class="tab-btn active" onclick="switchTab('editor')">Write</button>
                        <button type="button" class="tab-btn" onclick="switchTab('preview')">Preview</button>
                    </div>

                    <div id="editor" class="tab-content">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Post Content (Markdown)</label>
                            <textarea name="content" id="contentTextarea" class="form-control" rows="12" 
                                      placeholder="Write your thoughts here..." required>{{ post.content }}</textarea>
                        </div>
                    </div>

                    <div id="preview" class="tab-content preview-pane">
                        <h5 class="fw-bold mb-3">Preview</h5>
                        <div id="previewContent" class="preview-content"></div>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-light border">Cancel</a>
                        <button type="submit" class="btn btn-primary fw-bold">Update Post</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        if (tab === 'preview') {
            document.getElementById('preview').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            updatePreview();
        } else {
            document.getElementById('editor').classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        }
    }

    function updatePreview() {
        const content = document.getElementById('contentTextarea').value;
        const previewDiv = document.getElementById('previewContent');
        previewDiv.innerHTML = marked.parse(content);
    }

    document.getElementById('contentTextarea').addEventListener('input', updatePreview);
</script>
</body>
</html>
                        <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                            Save Changes
                        </button>
                        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
            
            <p class="text-center mt-4 text-muted small">
                &copy; 2026 Mathforces Moderation Panel
            </p>
        </div>
    </div>
</div>

</body>
</html>
